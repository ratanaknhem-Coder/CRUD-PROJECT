<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="date" value="time" id="p">
    <input type="submit" name="click" id="123">
    <p id="o"></p>
    <script>
        document.getElementById('123').addEventListener('click',() => {
            const name = document.getElementById("p").value;
            document.getElementById("o").textContent=`${name}`;
        });
    </script>
</body>
</html>
